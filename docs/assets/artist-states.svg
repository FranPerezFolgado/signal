<svg width="100%" viewBox="0 0 1000 390" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Signal — artist lifecycle state machine</title>
  <desc>Artists move through TRACKED, FOLLOWING, PUBLISHED and BLACKLISTED states. Promotions can be automatic (play count threshold) or manual.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: sans-serif; }</style>
  </defs>
  <rect width="1000" height="390" fill="#ffffff"/>

  <!-- ── State boxes ──────────────────────────────────────────────────────── -->

  <!-- TRACKED: x=20 y=130 w=180 h=65 → right=200, center=(110,162) -->
  <rect x="20" y="130" width="180" height="65" rx="8" fill="#534AB7" stroke="#3C3489" stroke-width="0.5"/>
  <text x="110" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#EEEDFE">TRACKED</text>
  <text x="110" y="169" text-anchor="middle" font-size="9" fill="#AFA9EC">high_priority=true when</text>
  <text x="110" y="181" text-anchor="middle" font-size="9" fill="#AFA9EC">plays ≥ threshold at onboarding</text>

  <!-- FOLLOWING: x=400 y=130 w=180 h=65 → left=400, right=580, center=(490,162) -->
  <rect x="400" y="130" width="180" height="65" rx="8" fill="#534AB7" stroke="#3C3489" stroke-width="0.5"/>
  <text x="490" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#EEEDFE">FOLLOWING</text>
  <text x="490" y="169" text-anchor="middle" font-size="9" fill="#AFA9EC">artist-tracker monitors</text>
  <text x="490" y="181" text-anchor="middle" font-size="9" fill="#AFA9EC">new content actively</text>

  <!-- PUBLISHED: x=780 y=130 w=180 h=65 → left=780, right=960, center=(870,162) -->
  <rect x="780" y="130" width="180" height="65" rx="8" fill="#0F6E56" stroke="#085041" stroke-width="0.5"/>
  <text x="870" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#E1F5EE">PUBLISHED</text>
  <text x="870" y="169" text-anchor="middle" font-size="9" fill="#9FE1CB">published about this artist</text>
  <text x="870" y="181" text-anchor="middle" font-size="9" fill="#9FE1CB">→ FOLLOWING on new content</text>

  <!-- BLACKLISTED: x=385 y=285 w=200 h=55 → center=(485,312) -->
  <rect x="385" y="285" width="200" height="55" rx="8" fill="#A32D2D" stroke="#791F1F" stroke-width="0.5"/>
  <text x="485" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#FCEBEB">BLACKLISTED</text>
  <text x="485" y="325" text-anchor="middle" font-size="9" fill="#F5BEBE">never appears again</text>

  <!-- ── Transition: TRACKED → FOLLOWING ────────────────────────────────── -->
  <!-- Arrow in the 200px gap between x=200 and x=400, midpoint x=300 -->
  <line x1="200" y1="157" x2="400" y2="157" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="144" text-anchor="middle" font-size="10" fill="#555">plays ≥ AUTO_FOLLOW_PLAYS</text>
  <text x="300" y="172" text-anchor="middle" font-size="9" fill="#888">(auto) or manual</text>

  <!-- ── Transition: FOLLOWING → PUBLISHED ──────────────────────────────── -->
  <!-- Arrow in the 200px gap between x=580 and x=780, midpoint x=680 -->
  <line x1="580" y1="157" x2="780" y2="157" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="680" y="144" text-anchor="middle" font-size="10" fill="#555">publish</text>
  <text x="680" y="172" text-anchor="middle" font-size="9" fill="#888">(manual)</text>

  <!-- ── Transition: PUBLISHED → FOLLOWING (arc above states) ───────────── -->
  <path d="M870,130 C870,65 490,65 490,130" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="680" y="52" text-anchor="middle" font-size="10" fill="#555">new content detected</text>

  <!-- ── Blacklist transitions (red) ────────────────────────────────────── -->

  <!-- TRACKED → BLACKLISTED -->
  <path d="M110,195 L110,258 L385,312" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <text x="85" y="248" text-anchor="end" font-size="10" fill="#A32D2D">blacklist</text>

  <!-- FOLLOWING → BLACKLISTED (nearly vertical) -->
  <line x1="490" y1="195" x2="487" y2="285" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <text x="512" y="244" text-anchor="start" font-size="10" fill="#A32D2D">blacklist</text>
  <text x="512" y="256" text-anchor="start" font-size="9" fill="#A32D2D">(manual)</text>

  <!-- PUBLISHED → BLACKLISTED -->
  <path d="M870,195 L870,258 L585,312" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <text x="876" y="248" text-anchor="start" font-size="10" fill="#A32D2D">blacklist</text>

  <!-- ── Footer note ─────────────────────────────────────────────────────── -->
  <text x="500" y="365" text-anchor="middle" font-size="10" fill="#aaa">Artists enter as TRACKED (pipeline / Last.fm) or FOLLOWING (Spotify follow / added manually) · AUTO_FOLLOW_PLAYS=3 (default)</text>
</svg>
