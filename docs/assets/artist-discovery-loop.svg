<svg width="100%" viewBox="0 0 660 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Signal — Artist Discovery Loop (LASTFM_SIMILAR)</title>
  <desc>End-to-end flow from a FOLLOWING artist through Last.fm similarity expansion to insertion as TRACKED, then promotion to FOLLOWING and into the recommendation pipeline. Marks what is implemented vs pending v3.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: sans-serif; }</style>
  </defs>

  <rect width="660" height="700" fill="#ffffff"/>

  <!-- LEGEND -->
  <rect x="20"  y="10" width="12" height="12" rx="2" fill="#0F6E56"/>
  <text x="38"  y="21" font-size="11" fill="#888780">Service</text>
  <rect x="106" y="10" width="12" height="12" rx="2" fill="#534AB7"/>
  <text x="124" y="21" font-size="11" fill="#888780">Kafka topic</text>
  <rect x="222" y="10" width="12" height="12" rx="2" fill="#185FA5"/>
  <text x="240" y="21" font-size="11" fill="#888780">PostgreSQL</text>
  <rect x="336" y="10" width="12" height="12" rx="2" fill="#8B6914"/>
  <text x="354" y="21" font-size="11" fill="#888780">External API</text>
  <rect x="446" y="10" width="12" height="12" rx="2" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="464" y="21" font-size="11" fill="#888780">v3 pending</text>

  <!-- ─── PHASE 1 LABEL ─────────────────────────────────────────── -->
  <text x="330" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#0F6E56">① Expansion cycle · runs every LASTFM_SIMILAR_INTERVAL_HOURS (default 24 h)</text>

  <!-- [artists · FOLLOWING] blue y=55 h=44 -->
  <rect x="200" y="55" width="220" height="44" rx="7" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text x="310" y="74"  text-anchor="middle" font-size="13" font-weight="500" fill="#E6F1FB">artists · FOLLOWING</text>
  <text x="310" y="90"  text-anchor="middle" font-size="11" fill="#9FC3F0">PostgreSQL · last_similar_explored_at expired</text>

  <!-- arrow down -->
  <line x1="310" y1="99" x2="310" y2="123" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [artist-tracker] green y=123 h=44 -->
  <rect x="200" y="123" width="220" height="44" rx="7" fill="#0F6E56" stroke="#085041" stroke-width="0.5"/>
  <text x="310" y="142" text-anchor="middle" font-size="13" font-weight="500" fill="#E1F5EE">artist-tracker</text>
  <text x="310" y="158" text-anchor="middle" font-size="11" fill="#9FE1CB">_run_similar_expansion_cycle()</text>

  <!-- horizontal arrow to Last.fm -->
  <line x1="420" y1="145" x2="446" y2="145" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="433" y="137" text-anchor="middle" font-size="9" fill="#888">calls</text>

  <!-- [Last.fm API] amber y=123 h=44 right column -->
  <rect x="446" y="123" width="185" height="44" rx="7" fill="#8B6914" stroke="#6B4F0A" stroke-width="0.5"/>
  <text x="538" y="142" text-anchor="middle" font-size="13" font-weight="500" fill="#FEF3DC">Last.fm API</text>
  <text x="538" y="158" text-anchor="middle" font-size="11" fill="#F5D98A">artist.getSimilar · limit=10</text>

  <!-- arrow down from artist-tracker + label -->
  <line x1="310" y1="167" x2="310" y2="191" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="325" y="183" font-size="9" fill="#888">for each similar artist</text>

  <!-- [MBID dedup] blue y=191 h=44 -->
  <rect x="200" y="191" width="220" height="44" rx="7" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text x="310" y="210" text-anchor="middle" font-size="13" font-weight="500" fill="#E6F1FB">MBID dedup</text>
  <text x="310" y="226" text-anchor="middle" font-size="11" fill="#9FC3F0">external_ids→→'lastfm_mbid'</text>

  <!-- branch right: known → skip -->
  <line x1="420" y1="213" x2="446" y2="213" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <text x="433" y="205" text-anchor="middle" font-size="9" fill="#888">known</text>
  <rect x="446" y="200" width="185" height="27" rx="5" fill="#f0f0f0" stroke="#bbb" stroke-width="0.5"/>
  <text x="538" y="217" text-anchor="middle" font-size="11" fill="#555">similar_artist_skipped ↩</text>

  <!-- arrow down: new -->
  <line x1="310" y1="235" x2="310" y2="259" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="322" y="251" font-size="9" fill="#888">new</text>

  <!-- [INSERT artists TRACKED LASTFM_SIMILAR] blue y=259 h=58 -->
  <rect x="200" y="259" width="220" height="58" rx="7" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text x="310" y="278" text-anchor="middle" font-size="13" font-weight="500" fill="#E6F1FB">INSERT artists</text>
  <text x="310" y="294" text-anchor="middle" font-size="11" fill="#9FC3F0">status=TRACKED · source=LASTFM_SIMILAR</text>
  <text x="310" y="309" text-anchor="middle" font-size="11" fill="#9FC3F0">origin_artist_id · lastfm_mbid stored</text>

  <!-- arrow down -->
  <line x1="310" y1="317" x2="310" y2="341" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [artist.discovered] purple y=341 h=44 -->
  <rect x="200" y="341" width="220" height="44" rx="7" fill="#534AB7" stroke="#3C3489" stroke-width="0.5"/>
  <text x="310" y="360" text-anchor="middle" font-size="13" font-weight="500" fill="#EEEDFE">artist.discovered</text>
  <text x="310" y="376" text-anchor="middle" font-size="11" fill="#AFA9EC">Kafka · one message per inserted artist</text>

  <!-- note: mark_similar_explored -->
  <text x="310" y="397" text-anchor="middle" font-size="10" fill="#888780">mark_similar_explored() called on success · skipped on failure</text>

  <!-- dashed arrow to pending box -->
  <line x1="310" y1="403" x2="310" y2="421" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr-gray)"/>

  <!-- [auto-promoter pending] dashed y=421 h=48 -->
  <rect x="200" y="421" width="220" height="48" rx="7" fill="#f9f9f9" stroke="#bbb" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="310" y="441" text-anchor="middle" font-size="12" font-weight="500" fill="#666">auto-promoter</text>
  <text x="310" y="457" text-anchor="middle" font-size="10" fill="#aaa">v3 pending · no consumer yet</text>

  <!-- ─── PHASE 2 LABEL ─────────────────────────────────────────── -->
  <text x="330" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#185FA5">② Promotion path · auto-follow or manual via API</text>

  <!-- dashed arrow -->
  <line x1="310" y1="469" x2="310" y2="500" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr-gray)"/>

  <!-- [artists · FOLLOWING (promoted)] blue y=500 h=44 -->
  <rect x="200" y="500" width="220" height="44" rx="7" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text x="310" y="519" text-anchor="middle" font-size="13" font-weight="500" fill="#E6F1FB">artists · FOLLOWING</text>
  <text x="310" y="535" text-anchor="middle" font-size="11" fill="#9FC3F0">plays ≥ AUTO_FOLLOW_PLAYS (default 3)</text>

  <!-- arrow down -->
  <line x1="310" y1="544" x2="310" y2="568" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [artist-tracker top-tracks] green y=568 h=44 -->
  <rect x="200" y="568" width="220" height="44" rx="7" fill="#0F6E56" stroke="#085041" stroke-width="0.5"/>
  <text x="310" y="587" text-anchor="middle" font-size="13" font-weight="500" fill="#E1F5EE">artist-tracker</text>
  <text x="310" y="603" text-anchor="middle" font-size="11" fill="#9FE1CB">_run_cycle() · Spotify top tracks → raw.tracks</text>

  <!-- arrow down -->
  <line x1="310" y1="612" x2="310" y2="630" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [pipeline abbreviated] light y=630 h=30 -->
  <rect x="200" y="630" width="220" height="30" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="310" y="649" text-anchor="middle" font-size="11" fill="#555">normalizer → enricher → scorer</text>

  <!-- arrow down -->
  <line x1="310" y1="660" x2="310" y2="674" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [artist_recommendations] blue y=674 h=30 -->
  <rect x="200" y="674" width="220" height="30" rx="5" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text x="310" y="693" text-anchor="middle" font-size="12" font-weight="500" fill="#E6F1FB">artist_recommendations · PostgreSQL</text>
</svg>
