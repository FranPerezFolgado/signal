name: signal
services:
  # ─── Kafka (KRaft — sin Zookeeper desde Kafka 4.x / CP 8.x) ──────────────────
  kafka:
    image: confluentinc/cp-kafka:8.1.2
    container_name: signal-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 9092 → acceso externo (host); 29092 → comunicación interna entre contenedores
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Kafka topics init ────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:8.1.2
    container_name: signal-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.plays          --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.tracks         --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tracks.normalized  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tracks.enriched    --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic listening.history  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tracks.novel       --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic history-tracker.dlq  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic novelty-detector.dlq --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic scorer.dlq           --partitions 3 --replication-factor 1
      echo 'Topics creados:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"

  # ─── DB migrations (dbmate) ──────────────────────────────────────────────────
  migrate:
    image: ghcr.io/amacneil/dbmate:2
    container_name: signal-migrate
    command: --wait up
    environment:
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal?sslmode=disable
    volumes:
      - ./postgres/migrations:/db/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: signal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: signal
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signal}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── lastfm-ingester ─────────────────────────────────────────────────────────
  lastfm-ingester:
    build:
      context: ..
      dockerfile: services/lastfm-ingester/Dockerfile
    container_name: signal-lastfm-ingester
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      # Override host values with Docker-internal addresses
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal

  # ─── normalizer ──────────────────────────────────────────────────────────────
  normalizer:
    build:
      context: ..
      dockerfile: services/normalizer/Dockerfile
    container_name: signal-normalizer
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # ─── enricher ────────────────────────────────────────────────────────────────
  enricher:
    build:
      context: ..
      dockerfile: services/enricher/Dockerfile
    container_name: signal-enricher
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPOTIFY_RATE_LIMIT_PER_30S: 180
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      CIRCUIT_BREAKER_TIMEOUT_S: 60
      BACKOFF_BASE_S: 1
      BACKOFF_MAX_S: 30
      LASTFM_FALLBACK_ENABLED: "true"

  # ─── kafka-ui ────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: signal-kafka-ui
    profiles: [tools]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: signal
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ─── history-tracker ─────────────────────────────────────────────────────────
  history-tracker:
    build:
      context: ..
      dockerfile: services/history-tracker/Dockerfile
    container_name: signal-history-tracker
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal

  # ─── novelty-detector ────────────────────────────────────────────────────────
  novelty-detector:
    build:
      context: ..
      dockerfile: services/novelty-detector/Dockerfile
    container_name: signal-novelty-detector
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal
      AUTO_FOLLOW_PLAYS: "3"

  # ─── scorer ──────────────────────────────────────────────────────────────────
  scorer:
    build:
      context: ..
      dockerfile: services/scorer/Dockerfile
    container_name: signal-scorer
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal
      W1: "0.6"
      W2: "0.4"
      HP_BONUS: "1.2"
      SCORER_STATS_INTERVAL: "100"

  # ─── artist-tracker ──────────────────────────────────────────────────────────
  artist-tracker:
    build:
      context: ..
      dockerfile: services/artist-tracker/Dockerfile
    container_name: signal-artist-tracker
    profiles: [services]
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal

  # ─── api ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: signal-api
    profiles: [services]
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signal

volumes:
  kafka-data:
  postgres-data:
