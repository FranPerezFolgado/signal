run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - unused
    - gofmt
    - gocritic
    - misspell
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
  revive:
    rules:
      - name: exported

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
