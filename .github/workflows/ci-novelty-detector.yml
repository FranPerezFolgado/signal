name: ci-novelty-detector

on:
  push:
    branches: [main]
    paths:
      - 'services/novelty-detector/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/novelty-detector/**'

permissions:
  contents: read

jobs:
  test:
    name: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/novelty-detector
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: services/novelty-detector/go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
